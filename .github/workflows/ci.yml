name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-bundle
          path: com.angelcantugr.devworkflow.sdPlugin/bin/plugin.js
          retention-days: 7
